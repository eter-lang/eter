site_name: The Eter Programming Language

site_url: https://eter.github.io/
site_description: The Eter Programming Language
site_author: Eter Team

repo_url: https://github.com/eter-lang/eter
edit_uri: blob/main/docs/eter

theme:
  name: mkdocs
  color_mode: auto 
  user_color_mode_toggle: true
  nav_style: dark # primary, light, dark
  highlightjs: true
  hljs_style: github
  hljs_style_dark: github_dark
  hljs_languages:
    - yaml
    - rust
  analytics:
    gtag: G-ABC123
  shortcuts:
    help: 191    # ?
    next: 78     # n
    previous: 80 # p
    search: 83   # s
  navigation_depth: 2
  locale: en
