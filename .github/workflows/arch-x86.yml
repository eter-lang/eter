name: Arch Linux x86

on:
  # push:
  # pull_request:
  #   branches: [main]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    container: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { compiler: GNU, CC: gcc, CXX: g++ }
          - { compiler: LLVM, CC: clang, CXX: clang++ }
        type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          pacman -Sy --needed --noconfirm \
            ca-certificates cmake ninja gcc \
            llvm clang \
            python python-pip python-setuptools \
            wget diffutils xz
          pip3 install lit --break-system-packages
      - name: Build eter
        env:
          CC: ${{ matrix.compiler.CC }}
          CXX: ${{ matrix.compiler.CXX }}
        run: |
          LLVM_CMAKE_DIR="$(llvm-config --cmakedir)"
          MLIR_CMAKE_DIR="${LLVM_CMAKE_DIR%/llvm}/mlir"
          if [[ ! -f "${MLIR_CMAKE_DIR}/MLIRConfig.cmake" ]]; then
            MLIR_CMAKE_DIR="/usr/lib/cmake/mlir"
          fi
          FILECHECK_PATH="$(command -v FileCheck || command -v FileCheck-22 || true)"
          if [[ -n "${FILECHECK_PATH}" ]]; then
            LLVM_TOOLS_BIN_DIR="$(dirname "${FILECHECK_PATH}")"
          else
            LLVM_TOOLS_BIN_DIR="/usr/bin"
          fi
          mkdir build && cd build
          cmake -DLLVM_DIR="${LLVM_CMAKE_DIR}" \
                -DMLIR_DIR="${MLIR_CMAKE_DIR}" \
                -DLLVM_TOOLS_BINARY_DIR="${LLVM_TOOLS_BIN_DIR}" \
                -DCMAKE_BUILD_TYPE=${{ matrix.type }} \
                -G Ninja ../
          ninja -j2
      - name: Run tests
        run: |
          cd build
          lit -va ./test/
