name: Deploy mdBook to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cargo
        run: |
          curl -sL https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env

      - name: Install dependencies
        run: |
          wget -O /tmp/llvm-snapshot.gpg.key https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo gpg --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg /tmp/llvm-snapshot.gpg.key
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get clean
          sudo apt-get update
          sudo apt-get install -y llvm-22 llvm-22-dev llvm-22-tools clang-22 libmlir-22-dev mlir-22-tools doxygen ninja-build

      - name: Install mdBook
        run: cargo install mdbook

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="/usr/lib/llvm-22/"

      - name: Build Doxygen docs
        run: cmake --build build --target doc-doxygen

      - name: Build with mdBook
        run: |
          cd docs
          mdbook build

      - name: Copy Doxygen output to MDbook site
        run: |
          mkdir -p docs/book/api
          cp -r build/doxygen/html/* docs/book/api/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/book'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
